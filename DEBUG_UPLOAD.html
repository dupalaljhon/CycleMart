<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Upload Issue</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 900px;
            margin: 0 auto;
            padding: 40px;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .test-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .test-section h2 {
            color: #667eea;
            font-size: 18px;
            margin-bottom: 15px;
        }
        
        .result {
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            border-left: 5px solid;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        .result.success {
            background: #efe;
            border-color: #4f4;
            color: #060;
        }
        
        .result.error {
            background: #fee;
            border-color: #f44;
            color: #c00;
        }
        
        .result.warning {
            background: #ffc;
            border-color: #fa0;
            color: #840;
        }
        
        .result.info {
            background: #eef;
            border-color: #44f;
            color: #006;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 10px 10px 0;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .danger-btn {
            background: linear-gradient(135deg, #f44 0%, #c00 100%);
        }
        
        .code-block {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Debug Upload Issue</h1>
        <p class="subtitle">Let's find out exactly what's wrong</p>
        
        <div class="test-section">
            <h2>Test 1: Check Token</h2>
            <button onclick="checkToken()">Run Test 1</button>
            <div id="test1-result"></div>
        </div>
        
        <div class="test-section">
            <h2>Test 2: Check Backend</h2>
            <button onclick="checkBackend()">Run Test 2</button>
            <div id="test2-result"></div>
        </div>
        
        <div class="test-section">
            <h2>Test 3: Test Upload Endpoint</h2>
            <button onclick="testUpload()">Run Test 3</button>
            <div id="test3-result"></div>
        </div>
        
        <div class="test-section">
            <h2>Test 4: Check All localStorage</h2>
            <button onclick="checkLocalStorage()">Run Test 4</button>
            <div id="test4-result"></div>
        </div>
        
        <div class="test-section">
            <h2>🔧 Quick Fixes</h2>
            <button onclick="clearEverything()" class="danger-btn">Clear Everything & Force Logout</button>
            <div id="fix-result"></div>
        </div>
        
        <button onclick="runAllTests()" style="width: 100%; margin-top: 20px; padding: 15px; font-size: 18px;">
            🚀 Run All Tests
        </button>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:3001';
        
        function checkToken() {
            const resultDiv = document.getElementById('test1-result');
            const token = localStorage.getItem('authToken');
            
            if (!token) {
                resultDiv.innerHTML = `<div class="result error">❌ NO TOKEN FOUND\n\nYou are not logged in. Please login first.</div>`;
                return;
            }
            
            try {
                const parts = token.split('.');
                if (parts.length !== 3) {
                    throw new Error('Invalid token format');
                }
                
                const payload = JSON.parse(atob(parts[1]));
                const now = Math.floor(Date.now() / 1000);
                const isExpired = payload.exp && payload.exp < now;
                const createdAt = new Date(payload.iat * 1000);
                const expiresAt = new Date(payload.exp * 1000);
                
                let status = 'success';
                let message = '✅ TOKEN VALID';
                
                if (isExpired) {
                    status = 'error';
                    message = '❌ TOKEN EXPIRED';
                }
                
                resultDiv.innerHTML = `
                    <div class="result ${status}">
${message}

Token Details:
- User ID: ${payload.uid || 'N/A'}
- Email: ${payload.email || 'N/A'}
- Role: ${payload.role || 'N/A'}
- Created: ${createdAt.toLocaleString()}
- Expires: ${expiresAt.toLocaleString()}
- Status: ${isExpired ? 'EXPIRED ❌' : 'ACTIVE ✅'}

Token (first 50 chars):
${token.substring(0, 50)}...
                    </div>
                `;
                
            } catch (error) {
                resultDiv.innerHTML = `<div class="result error">❌ INVALID TOKEN\n\nError: ${error.message}\n\nToken: ${token.substring(0, 50)}...</div>`;
            }
        }
        
        async function checkBackend() {
            const resultDiv = document.getElementById('test2-result');
            
            try {
                resultDiv.innerHTML = `<div class="result info">⏳ Checking backend...</div>`;
                
                const response = await fetch(`${API_BASE}/`);
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="result success">
✅ BACKEND IS RUNNING

Response:
${JSON.stringify(data, null, 2)}
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="result error">
❌ BACKEND ERROR

Status: ${response.status}
Response: ${JSON.stringify(data, null, 2)}
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
❌ CANNOT CONNECT TO BACKEND

Error: ${error.message}

Make sure backend is running:
1. Open terminal
2. cd CycleMart/CycleMart-api-node
3. npm start

Or double-click START_BACKEND.bat
                    </div>
                `;
            }
        }
        
        async function testUpload() {
            const resultDiv = document.getElementById('test3-result');
            const token = localStorage.getItem('authToken');
            const userID = localStorage.getItem('userID');
            
            if (!token) {
                resultDiv.innerHTML = `<div class="result error">❌ No token found. Please login first.</div>`;
                return;
            }
            
            try {
                resultDiv.innerHTML = `<div class="result info">⏳ Testing upload endpoint...</div>`;
                
                const testData = {
                    product_name: 'Test Product',
                    price: 100,
                    description: 'Test description',
                    location: 'Test location',
                    uploader_id: parseInt(userID) || 1,
                    for_type: 'sale',
                    condition: 'new',
                    category: 'bicycle',
                    quantity: 1,
                    product_images: [],
                    product_videos: []
                };
                
                const response = await fetch(`${API_BASE}/api/addProduct`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(testData)
                });
                
                const data = await response.json();
                
                let html = '';
                
                if (response.status === 401) {
                    html = `
                        <div class="result error">
❌ 401 UNAUTHORIZED - THIS IS THE PROBLEM!

Response: ${JSON.stringify(data, null, 2)}

DIAGNOSIS:
${data.message || 'Token verification failed'}

POSSIBLE CAUSES:
1. Token is from old PHP backend
2. Token is expired
3. JWT_SECRET mismatch
4. Token format is invalid

SOLUTION:
Click "Clear Everything & Force Logout" below, then login again.
                        </div>
                    `;
                } else if (response.ok) {
                    html = `
                        <div class="result success">
✅ UPLOAD ENDPOINT WORKS!

Response: ${JSON.stringify(data, null, 2)}

Your authentication is working correctly!
                        </div>
                    `;
                } else {
                    html = `
                        <div class="result warning">
⚠️ UNEXPECTED RESPONSE

Status: ${response.status}
Response: ${JSON.stringify(data, null, 2)}
                        </div>
                    `;
                }
                
                resultDiv.innerHTML = html;
                
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
❌ REQUEST FAILED

Error: ${error.message}

This usually means:
1. Backend is not running
2. Network error
3. CORS issue
                    </div>
                `;
            }
        }
        
        function checkLocalStorage() {
            const resultDiv = document.getElementById('test4-result');
            
            const keys = [
                'authToken',
                'admin_token',
                'userID',
                'email',
                'role',
                'full_name',
                'phone',
                'street',
                'barangay',
                'city',
                'profile_image',
                'is_verified',
                'account_status',
                'violation_count'
            ];
            
            let html = '<div class="result info">📦 LOCALSTORAGE CONTENTS:\n\n';
            
            keys.forEach(key => {
                const value = localStorage.getItem(key);
                if (value) {
                    if (key === 'authToken' || key === 'admin_token') {
                        html += `${key}: ${value.substring(0, 30)}...\n`;
                    } else {
                        html += `${key}: ${value}\n`;
                    }
                }
            });
            
            html += '\n';
            
            // Check for token mismatch
            const token = localStorage.getItem('authToken');
            const userID = localStorage.getItem('userID');
            
            if (token && userID) {
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    if (payload.uid && parseInt(userID) !== parseInt(payload.uid)) {
                        html += '\n⚠️ WARNING: Token UID does not match stored userID!\n';
                        html += `Token UID: ${payload.uid}\n`;
                        html += `Stored userID: ${userID}\n`;
                        html += 'This will cause 403 errors!\n';
                    }
                } catch (e) {
                    html += '\n❌ Cannot decode token\n';
                }
            }
            
            html += '</div>';
            resultDiv.innerHTML = html;
        }
        
        function clearEverything() {
            const resultDiv = document.getElementById('fix-result');
            
            // Clear all localStorage
            localStorage.clear();
            
            // Also clear sessionStorage
            sessionStorage.clear();
            
            resultDiv.innerHTML = `
                <div class="result success">
✅ EVERYTHING CLEARED!

All tokens and data have been removed.

NEXT STEPS:
1. Close this page
2. Go to CycleMart application
3. You should be logged out
4. Login again with your credentials
5. Try uploading a product

This should fix the 401 error!
                </div>
            `;
        }
        
        async function runAllTests() {
            checkToken();
            await new Promise(resolve => setTimeout(resolve, 500));
            await checkBackend();
            await new Promise(resolve => setTimeout(resolve, 500));
            checkLocalStorage();
            await new Promise(resolve => setTimeout(resolve, 500));
            await testUpload();
        }
        
        // Auto-run all tests on page load
        window.onload = () => {
            setTimeout(runAllTests, 500);
        };
    </script>
</body>
</html>
