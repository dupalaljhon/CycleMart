<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug System Message</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .log { background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        input { padding: 8px; margin: 5px; border: 1px solid #ccc; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>🔧 System Message Debug Tool</h1>
    
    <div>
        <h2>Test System Message</h2>
        <input type="number" id="conversationId" placeholder="Conversation ID" value="1">
        <input type="number" id="buyerId" placeholder="Buyer ID" value="2">
        <input type="text" id="buyerName" placeholder="Buyer Name" value="John Doe">
        <input type="text" id="productName" placeholder="Product Name" value="Test Bike">
        <input type="number" id="price" placeholder="Price" value="500.00">
        <select id="status">
            <option value="sold">Sold</option>
            <option value="traded">Traded</option>
        </select>
        <br><br>
        <button onclick="testSystemMessage()">🧪 Send Test System Message</button>
        <button onclick="checkConversationMessages()">📥 Check Conversation Messages</button>
        <button onclick="clearLogs()">🗑️ Clear Logs</button>
    </div>

    <div id="logs"></div>

    <script>
        const API_BASE = 'http://api.cyclemart.shop/CycleMart-api/api';
        
        function log(message, type = 'log') {
            const logsDiv = document.getElementById('logs');
            const logDiv = document.createElement('div');
            logDiv.className = `log ${type}`;
            logDiv.innerHTML = `<strong>[${new Date().toLocaleTimeString()}]</strong> ${message}`;
            logsDiv.appendChild(logDiv);
            logsDiv.scrollTop = logsDiv.scrollHeight;
            console.log(`[${type.toUpperCase()}] ${message}`);
        }

        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
        }

        async function testSystemMessage() {
            const conversationId = document.getElementById('conversationId').value;
            const buyerName = document.getElementById('buyerName').value;
            const productName = document.getElementById('productName').value;
            const price = parseFloat(document.getElementById('price').value);
            const status = document.getElementById('status').value;
            
            log('🚀 Starting system message test...', 'log');
            log(`📋 Parameters: Conv ${conversationId}, ${status} to ${buyerName}, Product: ${productName}, Price: $${price}`, 'log');
            
            const systemMessageText = `✅ This product has been successfully marked as ${status === 'sold' ? 'Sold' : 'Traded'} to ${buyerName}.\\n\\n` +
                `📦 Product: ${productName}\\n` +
                `💰 Price: ${price.toFixed(2)}\\n` +
                `📊 Status: ${status === 'sold' ? 'Sold' : 'Traded'}\\n\\n` +
                `👤 Buyer: ${buyerName}\\n\\n` +
                `⭐ You can now rate the seller by clicking the ⭐ icon on the upper-right side.`;

            const messageData = {
                conversation_id: parseInt(conversationId),
                sender_id: 0, // System message
                message_text: systemMessageText,
                attachments: []
            };

            log('📤 Sending POST request to sendMessage API...', 'log');
            log('🔗 URL: ' + API_BASE + 'routes.php', 'log');
            log('📦 Request body: ' + JSON.stringify(messageData, null, 2), 'log');

            try {
                const response = await fetch(API_BASE + 'routes.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        request: 'sendMessage',
                        data: messageData
                    })
                });

                log('📥 Response received. Status: ' + response.status, 'log');
                
                const result = await response.json();
                log('📊 Response data: ' + JSON.stringify(result, null, 2), result.status === 'success' ? 'success' : 'error');
                
                if (result.status === 'success') {
                    log('✅ System message sent successfully!', 'success');
                    log('🆔 Message ID: ' + result.data.message_id, 'success');
                } else {
                    log('❌ Failed to send system message: ' + result.message, 'error');
                }
                
            } catch (error) {
                log('❌ Network error: ' + error.message, 'error');
                console.error('Full error:', error);
            }
        }

        async function checkConversationMessages() {
            const conversationId = document.getElementById('conversationId').value;
            
            log('🔍 Checking messages in conversation ' + conversationId, 'log');
            
            try {
                const response = await fetch(API_BASE + 'routes.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        request: 'getConversationMessages',
                        conversation_id: conversationId
                    })
                });

                const result = await response.json();
                log('📥 Messages response: ' + JSON.stringify(result, null, 2), 'log');
                
                if (result.status === 'success' && result.data) {
                    const systemMessages = result.data.filter(msg => msg.sender_id == 0 || msg.is_system_message);
                    log(`📊 Total messages: ${result.data.length}, System messages: ${systemMessages.length}`, 'success');
                    
                    if (systemMessages.length > 0) {
                        log('🟢 System messages found:', 'success');
                        systemMessages.forEach(msg => {
                            log(`  - ID: ${msg.message_id}, Type: ${msg.system_message_type || 'unknown'}, Text preview: ${msg.message_text.substring(0, 50)}...`, 'success');
                        });
                    } else {
                        log('❌ No system messages found in this conversation', 'error');
                    }
                } else {
                    log('❌ Failed to get messages: ' + result.message, 'error');
                }
                
            } catch (error) {
                log('❌ Network error: ' + error.message, 'error');
            }
        }

        // Initial log
        log('🔧 Debug tool loaded. Ready to test system messages!', 'success');
    </script>
</body>
</html>
