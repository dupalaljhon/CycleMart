<!DOCTYPE html>
<html>
<head>
    <title>Dashboard API Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        h2 { color: #333; }
        pre { background: #f4f4f4; padding: 15px; border-radius: 5px; overflow-x: auto; }
        .section { margin-bottom: 30px; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>CycleMart Dashboard API Test</h1>
    
    <div class="section">
        <h2>Dashboard Stats</h2>
        <div id="stats-status"></div>
        <pre id="stats-data"></pre>
    </div>
    
    <div class="section">
        <h2>Recent Activities</h2>
        <div id="activities-status"></div>
        <pre id="activities-data"></pre>
    </div>
    
    <div class="section">
        <h2>Chart Data</h2>
        <div id="chart-status"></div>
        <pre id="chart-data"></pre>
    </div>

    <script>
        const baseUrl = 'http://api.cyclemart.shop/CycleMart-api/api';
        
        // Test Dashboard Stats
        fetch(baseUrl + 'dashboard-stats')
            .then(response => response.json())
            .then(data => {
                document.getElementById('stats-status').innerHTML = '<span class="success">✓ Success</span>';
                document.getElementById('stats-data').textContent = JSON.stringify(data, null, 2);
            })
            .catch(error => {
                document.getElementById('stats-status').innerHTML = '<span class="error">✗ Error: ' + error + '</span>';
            });
        
        // Test Recent Activities
        fetch(baseUrl + 'recent-activities?limit=10')
            .then(response => response.json())
            .then(data => {
                document.getElementById('activities-status').innerHTML = '<span class="success">✓ Success</span>';
                document.getElementById('activities-data').textContent = JSON.stringify(data, null, 2);
            })
            .catch(error => {
                document.getElementById('activities-status').innerHTML = '<span class="error">✗ Error: ' + error + '</span>';
            });
        
        // Test Chart Data
        fetch(baseUrl + 'chart-data')
            .then(response => response.json())
            .then(data => {
                document.getElementById('chart-status').innerHTML = '<span class="success">✓ Success</span>';
                document.getElementById('chart-data').textContent = JSON.stringify(data, null, 2);
            })
            .catch(error => {
                document.getElementById('chart-status').innerHTML = '<span class="error">✗ Error: ' + error + '</span>';
            });
    </script>
</body>
</html>
