<div class="guidelines-container">
  <div class="guidelines-header">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-2xl font-bold text-white flex items-center gap-2">
        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 1.343-3 3v5h6v-5c0-1.657-1.343-3-3-3z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 11V9a5 5 0 0110 0v2"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 11h14v8a2 2 0 01-2 2H7a2 2 0 01-2-2v-8z"/>
        </svg>
        Buying Process
      </h2>
      <div class="flex gap-1">
        <button
          (click)="expandAllSteps()"
          class="text-xs px-3 py-1.5 bg-white/10 hover:bg-white/20 text-white rounded-lg transition-colors">
          Expand All
        </button>
        <button
          (click)="closeAllSteps()"
          class="text-xs px-3 py-1.5 bg-white/10 hover:bg-white/20 text-white rounded-lg transition-colors">
          Collapse All
        </button>
      </div>
    </div>
    <p class="text-gray-300 text-sm">
      Follow this step-by-step buying process so your transactions are safe, clear, and successful.
    </p>
  </div>

  <div class="rules-list">
    <div
      *ngFor="let step of steps"
      class="rule-item"
      [class.expanded]="step.expanded">

      <button
        (click)="toggleStep(step)"
        class="rule-header">
        <div class="flex items-center gap-3 flex-1">
          <span class="rule-number">{{ step.id }}</span>
          <span class="rule-title">{{ step.title }}</span>
        </div>
        <svg
          class="rule-icon"
          [class.rotated]="step.expanded"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>

      <div class="rule-content" [class.show]="step.expanded">
        <div class="rule-description">
          <div class="flex items-start gap-3">
            <svg class="w-5 h-5 text-blue-500 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <p class="text-gray-300 leading-relaxed">{{ step.description }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="guidelines-footer">
    <div class="flex items-start gap-3 bg-amber-900/30 border border-amber-700/50 rounded-xl p-4">
      <svg class="w-6 h-6 text-amber-400 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
      </svg>
      <div>
        <p class="text-amber-200 font-semibold mb-1">Buying Reminder</p>
        <p class="text-amber-100 text-sm">
          Never send payment without clear confirmation. Keep all transaction communication inside CycleMart chat for better support and protection.
        </p>
      </div>
    </div>
  </div>
</div>
