<div class="min-h-screen deny-shell flex items-center justify-center p-4">
  <div class="max-w-md w-full deny-card overflow-hidden">
    <div class="deny-header p-6 text-center">
      <div class="deny-header-icon w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </div>
      <h1 class="text-2xl font-bold">Account Verification</h1>
      <p class="deny-subtitle mt-2">CycleMart Security Confirmation</p>
    </div>

    <div class="p-8">
      <div *ngIf="status === 'loading'" class="text-center">
        <div class="deny-spinner mx-auto mb-4"></div>
        <h2 class="text-xl font-semibold text-gray-800 mb-2">Processing Request</h2>
        <p class="text-gray-600">Please wait while we cancel the registration...</p>
      </div>

      <div *ngIf="status === 'success'" class="text-center">
        <div class="status-icon success">
          <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
          </svg>
        </div>
        <h2 class="text-xl font-semibold mb-2 deny-state-title">Request Completed</h2>
        <p class="text-gray-600 mb-6">{{ message }}</p>
        <button
          (click)="navigateToLogin()"
          class="w-full btn-deny-secondary py-3 px-6 rounded-lg font-semibold"
        >
          Back to Login
        </button>
      </div>

      <div *ngIf="status === 'error'" class="text-center">
        <div class="status-icon error">
          <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </div>
        <h2 class="text-xl font-semibold deny-state-title error mb-2">Request Failed</h2>
        <p class="text-gray-600 mb-6">{{ message }}</p>
        <button
          (click)="navigateToLogin()"
          class="w-full btn-deny-secondary py-3 px-6 rounded-lg font-semibold"
        >
          Back to Login
        </button>
      </div>
    </div>

    <div class="deny-footer px-8 py-4 text-center">
      <p class="text-sm text-gray-500">
        Need help? Contact us at
        <a href="mailto:cyclemrt&#64;gmail.com" class="deny-link hover:underline">cyclemrt&#64;gmail.com</a>
      </p>
    </div>
  </div>
</div>
