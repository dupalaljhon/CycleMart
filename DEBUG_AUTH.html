<!DOCTYPE html>
<html>
<head>
    <title>Debug Authentication</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
        .section { margin: 20px 0; padding: 15px; background: #2d2d2d; border-left: 4px solid #007acc; }
        .error { border-left-color: #f44336; }
        .success { border-left-color: #4caf50; }
        .warning { border-left-color: #ff9800; }
        pre { background: #1e1e1e; padding: 10px; overflow-x: auto; }
        button { background: #007acc; color: white; border: none; padding: 10px 20px; cursor: pointer; margin: 5px; }
        button:hover { background: #005a9e; }
    </style>
</head>
<body>
    <h1>🔍 Authentication Debugger</h1>
    
    <div class="section">
        <h2>Step 1: Check localStorage</h2>
        <button onclick="checkLocalStorage()">Check Storage</button>
        <div id="storageResult"></div>
    </div>

    <div class="section">
        <h2>Step 2: Decode Token</h2>
        <button onclick="decodeToken()">Decode Token</button>
        <div id="tokenResult"></div>
    </div>

    <div class="section">
        <h2>Step 3: Test API with Token</h2>
        <button onclick="testAPI()">Test API Call</button>
        <div id="apiResult"></div>
    </div>

    <div class="section">
        <h2>Step 4: Clear & Reload</h2>
        <button onclick="clearAll()">Clear All & Reload</button>
    </div>

    <script>
        function checkLocalStorage() {
            const result = document.getElementById('storageResult');
            const authToken = localStorage.getItem('authToken');
            const adminToken = localStorage.getItem('admin_token');
            const userId = localStorage.getItem('id');
            const email = localStorage.getItem('email');
            
            let html = '<pre>';
            html += 'authToken: ' + (authToken ? authToken.substring(0, 50) + '...' : 'NULL') + '\n';
            html += 'admin_token: ' + (adminToken ? adminToken.substring(0, 50) + '...' : 'NULL') + '\n';
            html += 'userId: ' + (userId || 'NULL') + '\n';
            html += 'email: ' + (email || 'NULL') + '\n';
            html += '</pre>';
            
            if (!authToken && !adminToken) {
                result.innerHTML = '<div class="section error"><h3>❌ NO TOKEN FOUND</h3>' + html + '<p><strong>Solution:</strong> You need to login first!</p></div>';
            } else {
                result.innerHTML = '<div class="section success"><h3>✅ Token Found</h3>' + html + '</div>';
            }
        }

        function decodeToken() {
            const result = document.getElementById('tokenResult');
            const token = localStorage.getItem('authToken') || localStorage.getItem('admin_token');
            
            if (!token) {
                result.innerHTML = '<div class="section error"><h3>❌ No token to decode</h3><p>Login first!</p></div>';
                return;
            }

            try {
                const parts = token.split('.');
                if (parts.length !== 3) {
                    throw new Error('Invalid token format');
                }
                
                const header = JSON.parse(atob(parts[0]));
                const payload = JSON.parse(atob(parts[1]));
                const now = Math.floor(Date.now() / 1000);
                const isExpired = payload.exp < now;
                const timeLeft = Math.max(0, Math.floor((payload.exp - now) / 60));
                
                let html = '<div class="section ' + (isExpired ? 'error' : 'success') + '">';
                html += '<h3>' + (isExpired ? '❌ Token EXPIRED' : '✅ Token Valid') + '</h3>';
                html += '<pre>';
                html += 'Header:\n' + JSON.stringify(header, null, 2) + '\n\n';
                html += 'Payload:\n' + JSON.stringify(payload, null, 2) + '\n\n';
                html += 'Issued: ' + new Date(payload.iat * 1000).toLocaleString() + '\n';
                html += 'Expires: ' + new Date(payload.exp * 1000).toLocaleString() + '\n';
                html += 'Time Left: ' + timeLeft + ' minutes\n';
                html += 'Is Expired: ' + isExpired + '\n';
                html += '</pre>';
                
                if (isExpired) {
                    html += '<p><strong>Solution:</strong> Token expired! Logout and login again.</p>';
                }
                
                html += '</div>';
                result.innerHTML = html;
            } catch (error) {
                result.innerHTML = '<div class="section error"><h3>❌ Error Decoding Token</h3><pre>' + error.message + '</pre></div>';
            }
        }

        async function testAPI() {
            const result = document.getElementById('apiResult');
            const token = localStorage.getItem('authToken') || localStorage.getItem('admin_token');
            const userId = localStorage.getItem('id');
            
            if (!token) {
                result.innerHTML = '<div class="section error"><h3>❌ No token</h3><p>Login first!</p></div>';
                return;
            }

            result.innerHTML = '<p>Testing API call...</p>';

            const testData = {
                product_name: 'DEBUG TEST PRODUCT',
                brand_name: 'shimano',
                price: 1,
                description: 'This is a debug test product to verify authentication is working correctly',
                location: 'Debug Location',
                for_type: 'sale',
                condition: 'second hand',
                category: 'others',
                quantity: 1,
                uploader_id: parseInt(userId),
                bicycle_brand_id: 1,
                bicycle_part_id: 1,
                product_images: JSON.stringify([]),
                product_videos: JSON.stringify([]),
                specifications: []
            };

            try {
                const response = await fetch('http://localhost:3001/api/addProduct', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(testData)
                });

                const data = await response.json();
                
                let html = '<div class="section ' + (response.ok ? 'success' : 'error') + '">';
                html += '<h3>' + (response.ok ? '✅ API Call Successful!' : '❌ API Call Failed') + '</h3>';
                html += '<p><strong>Status:</strong> ' + response.status + ' ' + response.statusText + '</p>';
                html += '<p><strong>URL:</strong> ' + response.url + '</p>';
                html += '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                
                if (response.status === 401) {
                    html += '<h4>🔍 Debugging 401 Error:</h4>';
                    html += '<ol>';
                    html += '<li>Check if backend is running: <a href="http://localhost:3001/" target="_blank">http://localhost:3001/</a></li>';
                    html += '<li>Verify JWT_SECRET in backend .env file</li>';
                    html += '<li>Check if token was created by Node.js backend (not PHP)</li>';
                    html += '<li>Verify uploader_id (' + userId + ') matches token uid</li>';
                    html += '</ol>';
                    html += '<p><strong>Most Common Fix:</strong> Logout and login again to get a fresh token from Node.js backend!</p>';
                }
                
                html += '</div>';
                result.innerHTML = html;
            } catch (error) {
                result.innerHTML = '<div class="section error"><h3>❌ Network Error</h3><pre>' + error.message + '</pre><p>Is the backend running?</p></div>';
            }
        }

        function clearAll() {
            if (confirm('This will clear all localStorage and reload. Continue?')) {
                localStorage.clear();
                location.reload();
            }
        }

        // Auto-run on load
        window.onload = () => {
            checkLocalStorage();
            const token = localStorage.getItem('authToken') || localStorage.getItem('admin_token');
            if (token) {
                decodeToken();
            }
        };
    </script>
</body>
</html>
